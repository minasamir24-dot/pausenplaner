<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausenplaner - Apotheke</title>
    <style>
        :root { --primary: #2E7D32; --secondary: #1565C0; --bg: #F5F5F5; --card: #FFFFFF; --text: #212121; --kitchen: #FFA726; --basement: #5C6BC0; --error: #D32F2F; --success: #388E3C; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1rem; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        h1, h2 { text-align: center; margin-bottom: 1rem; }
        h1 { color: var(--primary); }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--error); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .role-select { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .role-option { flex: 1; padding: 1rem; border: 2px solid #ddd; border-radius: 4px; cursor: pointer; text-align: center; }
        .role-option.selected { border-color: var(--primary); background: rgba(46,125,50,0.1); }
        .role-option.manager.selected { border-color: var(--secondary); background: rgba(21,101,192,0.1); }
        .hidden { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.875rem; }
        .badge-employee { background: var(--primary); color: white; }
        .badge-manager { background: var(--secondary); color: white; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .weekday { text-align: center; font-weight: bold; padding: 0.5rem; font-size: 0.875rem; color: #666; }
        .day { padding: 0.75rem; text-align: center; cursor: pointer; border-radius: 4px; position: relative; }
        .day:hover { background: #eee; }
        .day.selected { background: var(--primary); color: white; }
        .day.today { border: 2px solid var(--primary); }
        .day.other-month { color: #ccc; }
        .booking-form { border-top: 1px solid #eee; padding-top: 1rem; margin-top: 1rem; }
        .location-options { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .location-option { flex: 1; padding: 1rem; border: 2px solid #ddd; border-radius: 4px; cursor: pointer; text-align: center; }
        .location-option.selected { border-color: var(--primary); background: rgba(46,125,50,0.1); background: #e8f5e9; }
        .bookings-table { width: 100%; border-collapse: collapse; }
        .bookings-table th, .bookings-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
        .location-keller { color: var(--basement); font-weight: 500; }
        .location-küche { color: var(--kitchen); font-weight: 500; }
        .message { padding: 1rem; border-radius: 4px; margin-bottom: 1rem; text-align: center; }
        .message.error { background: #ffebee; color: var(--error); }
        .message.success { background: #e8f5e9; color: var(--success); }
        .my-booking { background: #e8f5e9; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
        .my-booking h3 { color: var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pausenplaner</h1>
        
        <div id="login-view">
            <div class="card">
                <h2>Anmeldung</h2>
                <div class="role-select">
                    <div class="role-option" id="btn-mitarbeiter" onclick="selectRole('employee')">Mitarbeiter</div>
                    <div class="role-option" id="btn-leiter" onclick="selectRole('manager')">Leiter</div>
                </div>
                <div id="name-div">
                    <label>Name:</label>
                    <input type="text" id="input-name" placeholder="Ihr Name">
                </div>
                <button class="btn btn-primary" onclick="doLogin()">Anmelden</button>
            </div>
        </div>

        <div id="app-view" class="hidden">
            <div class="card">
                <div class="header">
                    <div><span id="welcome"></span> <span class="badge" id="badge"></span></div>
                    <button class="btn btn-secondary" style="width:auto;padding:0.5rem;" onclick="doLogout()">Abmelden</button>
                </div>
            </div>

            <div class="card">
                <div class="calendar-nav">
                    <button class="btn btn-primary" style="width:40px;" onclick="changeMonth(-1)">&lt;</button>
                    <strong id="month-label"></strong>
                    <button class="btn btn-primary" style="width:40px;" onclick="changeMonth(1)">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendar"></div>
            </div>

            <div class="card">
                <h2 id="day-label"></h2>
                <div id="message"></div>
                
                <table class="bookings-table">
                    <thead><tr><th>Zeit</th><th>Ort</th><th>Name</th></tr></thead>
                    <tbody id="breaks-list"></tbody>
                </table>

                <div id="form-div" class="booking-form hidden">
                    <h3>Pause buchen</h3>
                    <select id="hour-select"></select>
                    <select id="min-select"></select>
                    <div class="location-options">
                        <div class="location-option" id="opt-keller" onclick="pickLocation('Keller')">Keller</div>
                        <div class="location-option" id="opt-kuche" onclick="pickLocation('Küche')">Küche</div>
                    </div>
                    <button class="btn btn-primary" onclick="doBook()">Buchen</button>
                </div>

                <div id="my-break" class="my-booking hidden">
                    <h3>Ihre Pause</h3>
                    <p id="break-info"></p>
                    <button class="btn btn-danger" onclick="doCancel()">Stornieren</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script>
    // ===== CONFIG =====
    const config = {
        apiKey: "AIzaSyBS3pWs4nm_hmaAGCvuaHTKxlppWgb4-2Q",
        authDomain: "pausenplanner.firebaseapp.com",
        projectId: "pausenplanner",
        storageBucket: "pausenplanner.firebasestorage.app",
        messagingSenderId: "142766491427",
        appId: "1:142766491427:web:be22d6087c1ebcb85d2e96"
    };

    // ===== STATE =====
    let db, user, role = 'employee', month = new Date().getMonth(), year = new Date().getFullYear();
    let selectedDate, selectedLocation, breaks = [];

    // ===== INIT =====
    firebase.initializeApp(config);
    db = firebase.firestore();
    console.log("Firebase ready");

    // ===== FUNCTIONS =====
    function selectRole(r) { 
        role = r;
        document.getElementById('btn-mitarbeiter').className = r === 'employee' ? 'role-option selected' : 'role-option';
        document.getElementById('btn-leiter').className = r === 'manager' ? 'role-option selected' : 'role-option';
        document.getElementById('name-div').style.display = r === 'employee' ? 'block' : 'none';
    }

    function doLogin() {
        let name = document.getElementById('input-name').value.trim();
        if (role === 'employee' && !name) return alert('Bitte Namen eingeben');
        user = role === 'manager' ? 'Leiter' : name;
        
        document.getElementById('login-view').className = 'hidden';
        document.getElementById('app-view').className = '';
        
        document.getElementById('welcome').innerText = 'Hallo, ' + user + '!';
        document.getElementById('badge').innerText = role === 'manager' ? 'Leiter' : 'Mitarbeiter';
        document.getElementById('badge').className = 'badge ' + (role === 'manager' ? 'badge-manager' : 'badge-employee');
        
        loadBreaks();
        drawCalendar();
        fillTimeSelect();
    }

    function doLogout() {
        user = null;
        selectedDate = null;
        document.getElementById('app-view').className = 'hidden';
        document.getElementById('login-view').className = '';
    }

    function fillTimeSelect() {
        let hs = document.getElementById('hour-select');
        let ms = document.getElementById('min-select');
        hs.innerHTML = ''; ms.innerHTML = '';
        for (let h = 8; h <= 17; h++) hs.innerHTML += '<option value="' + h + '">' + h + ' Uhr</option>';
        ['00','05','10','15','20','25','30','35','40','45','50','55'].forEach(m => ms.innerHTML += '<option value="' + m + '">' + m + '</option>');
    }

    function changeMonth(delta) {
        month += delta;
        if (month > 11) { month = 0; year++; }
        if (month < 0) { month = 11; year--; }
        drawCalendar();
    }

    function drawCalendar() {
        let cal = document.getElementById('calendar');
        let label = document.getElementById('month-label');
        let months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
        label.innerText = months[month] + ' ' + year;
        
        let html = 'Mo Di Mi Do Fr Sa So'.split(' ').map(d => '<div class="weekday">' + d + '</div>').join('');
        
        let first = new Date(year, month, 1);
        let last = new Date(year, month + 1, 0);
        let start = first.getDay() === 0 ? 6 : first.getDay() - 1;
        
        for (let i = start - 1; i >= 0; i--) html += '<div class="day other-month">' + (new Date(year, month, 0).getDate() - i) + '</div>';
        
        let today = new Date();
        for (let d = 1; d <= last.getDate(); d++) {
            let ds = year + '-' + (month + 1) + '-' + d;
            let isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
            let has = breaks.filter(b => b.date === ds).length;
            let cls = 'day' + (isToday ? ' today' : '') + (selectedDate === ds ? ' selected' : '') + (has > 0 ? ' has-booking' : '');
            html += '<div class="' + cls + '" onclick="pickDate(\'' + ds + '\')">' + d + '</div>';
        }
        
        for (let i = 1; i <= 42 - (start + last.getDate()); i++) html += '<div class="day other-month">' + i + '</div>';
        
        cal.innerHTML = html;
    }

    function pickDate(ds) {
        selectedDate = ds;
        drawCalendar();
        showDay();
    }

    function showDay() {
        let dayLabel = document.getElementById('day-label');
        let parts = selectedDate.split('-');
        let months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
        dayLabel.innerText = parts[2] + '. ' + months[month] + ' ' + year;

        renderBreaks();

        let form = document.getElementById('form-div');
        let my = document.getElementById('my-break');
        
        if (role === 'employee') {
            let mine = breaks.find(b => b.date === selectedDate && b.name === user);
            if (mine) {
                form.className = 'booking-form hidden';
                my.className = 'my-booking';
                let [h, m] = mine.time.split(':');
                document.getElementById('break-info').innerText = mine.time + ' - ' + (parseInt(h)+1) + ':' + m + ' Uhr, ' + mine.location;
            } else {
                form.className = 'booking-form';
                my.className = 'my-booking hidden';
                document.querySelectorAll('.location-option').forEach(el => el.className = 'location-option');
                selectedLocation = null;
            }
        }
    }

    function renderBreaks() {
        let list = document.getElementById('breaks-list');
        let dayBreaks = breaks.filter(b => b.date === selectedDate).sort((a,b) => a.time.localeCompare(b.time));
        
        if (dayBreaks.length === 0) {
            list.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#999;">Keine Pausen</td></tr>';
        } else {
            list.innerHTML = dayBreaks.map(b => {
                let [h, m] = b.time.split(':');
                return '<tr><td>' + b.time + ' - ' + (parseInt(h)+1) + ':' + m + '</td><td class="location-' + b.location.toLowerCase().replace('ü','u') + '">' + b.location + '</td><td>' + b.name + '</td></tr>';
            }).join('');
        }
    }

    function pickLocation(loc) {
        selectedLocation = loc;
        document.getElementById('opt-keller').className = loc === 'Keller' ? 'location-option selected' : 'location-option';
        document.getElementById('opt-kuche').className = loc === 'Küche' ? 'location-option selected' : 'location-option';
    }

    function showMessage(msg, type) {
        document.getElementById('message').innerHTML = '<div class="message ' + type + '">' + msg + '</div>';
        setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
    }

    async function doBook() {
        if (!selectedLocation) return showMessage('Bitte Ort wählen', 'error');
        
        let h = document.getElementById('hour-select').value;
        let m = document.getElementById('min-select').value;
        let time = h + ':' + m;
        
        let atTime = breaks.filter(b => b.date === selectedDate && b.time === time);
        if (atTime.length >= 2) return showMessage('Zeit voll besetzt', 'error');
        if (atTime.map(b => b.location).includes(selectedLocation)) return showMessage('Ort bereits gebucht', 'error');
        if (breaks.find(b => b.date === selectedDate && b.name === user)) return showMessage('Bereits gebucht', 'error');
        
        await db.collection('breaks').add({ name: user, date: selectedDate, time: time, location: selectedLocation });
        
        showMessage('✓ Gebucht: ' + time + ', ' + selectedLocation, 'success');
        
        await loadBreaks();
        drawCalendar();
        showDay();
    }

    async function doCancel() {
        let mine = breaks.find(b => b.date === selectedDate && b.name === user);
        if (mine) {
            await db.collection('breaks').doc(mine.id).delete();
            showMessage('✓ Storniert', 'success');
            await loadBreaks();
            drawCalendar();
            showDay();
        }
    }

    async function loadBreaks() {
        let snap = await db.collection('breaks').get();
        breaks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // Start
    selectRole('employee');
    drawCalendar();
    </script>
</body>
</html>
